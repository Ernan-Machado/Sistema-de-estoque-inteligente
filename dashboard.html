<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| Gestão de Estoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold text-blue-600 tracking-tight">InvSmart <span class="text-slate-400 font-light">Estoque</span></h1>
        <button onclick="logout()" class="text-sm font-medium text-red-500 hover:text-red-700 transition">Sair</button>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-xs font-semibold text-slate-400 uppercase">Total de Itens</p>
                <h2 id="card-total-itens" class="text-3xl font-bold text-slate-700">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-xs font-semibold text-slate-400 uppercase">Estoque Baixo</p>
                <h2 id="card-estoque-baixo" class="text-3xl font-bold text-red-500">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-blue-500">
                <p class="text-xs font-semibold text-slate-400 uppercase">Valor em Estoque</p>
                <h2 id="card-valor-total" class="text-2xl font-bold text-slate-700">R$ 0,00</h2>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="flex-1 relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="input-busca" onkeyup="filtrarProdutos()" 
                       placeholder="Buscar por nome ou SKU..." 
                       class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
            </div>
            <button onclick="document.getElementById('modal-cadastro').classList.toggle('hidden')" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition shadow-sm text-sm">
                + Novo Produto
            </button>
        </div>

        <div id="modal-cadastro" class="hidden bg-white p-6 rounded-xl border border-slate-200 shadow-xl mb-8 animate-in fade-in zoom-in duration-300">
            <h3 class="font-bold text-slate-700 mb-4">Cadastrar Novo Item</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="nome" placeholder="Nome do Produto" class="p-2 border rounded-lg text-sm">
                <input type="text" id="sku" placeholder="SKU/Código" class="p-2 border rounded-lg text-sm">
                <input type="number" id="preco" placeholder="Preço (R$)" class="p-2 border rounded-lg text-sm">
                <input type="number" id="estoque_minimo" placeholder="Estoque Mínimo" class="p-2 border rounded-lg text-sm">
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="cadastrarProduto()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-600">Salvar</button>
                <button onclick="document.getElementById('modal-cadastro').classList.add('hidden')" class="text-slate-400 px-4 py-2 text-sm">Cancelar</button>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase">Produto</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase text-center">Qtd</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase">Status</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-produtos" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
